name: Album Monitor

on:
  schedule:
    - cron: "0 * * * *"   # Every hour
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit status.json + index.html back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          HA_URL: ${{ secrets.HA_URL }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: python monitor.py

      - name: Commit updated status
        run: |
          git config user.name  "Album Monitor Bot"
          git config user.email "bot@users.noreply.github.com"
          git add status.json index.html
          git diff --staged --quiet || git commit -m "chore: update album status [skip ci]"
          git push
